name: "GitHub Copilot Setup Steps for UNIKL-UMS"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_sqlite, dom, filter, gd, iconv, json, mbstring, pdo, sqlite
          coverage: xdebug

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --no-dev --optimize-autoloader

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Create SQLite database for testing
        run: |
          mkdir -p database
          touch database/testing.sqlite

      - name: Run Laravel Pint (code formatting)
        run: ./vendor/bin/pint --test

      - name: Run PHPStan static analysis
        run: ./vendor/bin/phpstan analyse --memory-limit=2G

      - name: Build frontend assets
        run: npm run build

      - name: Run PestPHP tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/testing.sqlite
        run: ./vendor/bin/pest --coverage --min=80

      - name: Run architecture tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/testing.sqlite
        run: ./vendor/bin/pest --filter=arch

      - name: Generate documentation index
        run: |
          echo "# UNIKL-UMS Documentation Index" > docs/README.md
          echo "" >> docs/README.md
          echo "Generated on: $(date)" >> docs/README.md
          echo "" >> docs/README.md
          find docs -name "*.md" -not -name "README.md" | sort >> docs/README.md
