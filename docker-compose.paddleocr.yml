version: '3.8'

services:
  paddleocr:
    build:
      context: ./docker/paddleocr
      dockerfile: Dockerfile
    container_name: hisabi-paddleocr
    ports:
      - "${PADDLE_OCR_PORT:-8000}:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - hisabi

networks:
  hisabi:
    driver: bridge
